version: "3.9"

services:
  marketplace-api:
    build:
      context: .
      dockerfile: src/MarketPlace.Host/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__SqlServer=Server=localhost\\SQLEXPRESS;Database=marketplace;Trusted_Connection=True;TrustServerCertificate=True;
